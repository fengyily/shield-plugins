  clipboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>',
};

function renderResult() {
  const result = getLastResult();
  if (!result) return;
  const area = document.getElementById('resultArea');
  const _sortCol = getSortCol();
  const _sortAsc = getSortAsc();

  let rows = result.rows || [];
  if (_sortCol !== null && result.columns) {
    const col = result.columns[_sortCol];
    rows = [...rows].sort((a, b) => {
      let va = a[col], vb = b[col];
      if (va == null) va = '';
      if (vb == null) vb = '';
      if (typeof va === 'number' && typeof vb === 'number') return _sortAsc ? va - vb : vb - va;
      va = String(va); vb = String(vb);
      return _sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  const _ctx = getTableCtx();
  const canEdit = !readOnly && _ctx && _ctx.primaryKeys.length > 0;

  let toolbar = `<div class="result-toolbar">
    <div class="result-toolbar-left">
      <span class="count">${result.count} rows</span>
      <span class="duration">${esc(result.duration)}</span>
      <span style="color:var(--text3);font-size:11px">Click to copy · Double-click to view</span>
    </div>
    <div class="result-toolbar-right">
      ${canEdit ? `<button class="btn btn-sm btn-primary write-action" onclick="addNewRow()" style="gap:3px"><span style="display:inline-flex;width:14px;height:14px">${ICON.plus}</span> Insert</button>` : ''}
      <button class="btn btn-secondary btn-sm" onclick="copyAllResults()" style="gap:3px"><span style="display:inline-flex;width:13px;height:13px">${ICON.clipboard}</span> Copy All</button>
      <button class="btn btn-secondary btn-sm" onclick="exportCSV()" style="gap:3px"><span style="display:inline-flex;width:13px;height:13px">${ICON.download}</span> CSV</button>
    </div>
  </div>`;

  let table = '';
  if (result.columns && result.columns.length > 0) {
    table += '<div class="result-scroll"><table class="result-table"><thead><tr>';
    result.columns.forEach((col, i) => {
      let icon = '&#8597;', cls = '';
      if (_sortCol === i) { icon = _sortAsc ? '&#9650;' : '&#9660;'; cls = ' active'; }
      table += `<th onclick="sortByCol(${i})">${esc(col)} <span class="sort-icon${cls}">${icon}</span></th>`;
    });
    if (canEdit) table += '<th class="th-actions">Actions</th>';
    table += '</tr></thead><tbody>';

    window._displayRows = rows;

    for (let ri = 0; ri < rows.length; ri++) {
      const row = rows[ri];
      table += '<tr>';
      for (let ci = 0; ci < result.columns.length; ci++) {
        const val = row[result.columns[ci]];
        if (val == null) {
          table += `<td onclick="copyCellFromRow(this,${ri},${ci})" ondblclick="viewCellDetail(${ri},${ci})"><span class="null-value">NULL</span></td>`;
        } else {
          table += `<td onclick="copyCellFromRow(this,${ri},${ci})" ondblclick="viewCellDetail(${ri},${ci})">${esc(String(val))}</td>`;
        }
      }
      if (canEdit) {
        table += `<td class="td-actions"><div class="row-actions">
          <button class="row-action-btn btn-copy-row" title="Copy Row" onclick="copyRow(${ri})">${ICON.copy}</button>
          <button class="row-action-btn btn-edit" title="Edit" onclick="editRow(${ri})">${ICON.edit}</button>
          <button class="row-action-btn btn-delete" title="Delete" onclick="deleteRow(${ri})">${ICON.trash}</button>
        </div></td>`;
      }
      table += '</tr>';
    }
    table += '</tbody></table></div>';
  }

  area.innerHTML = toolbar + table;
}

function sortByCol(idx) {
  if (getSortCol() === idx) setSortAsc(!getSortAsc());
  else { setSortCol(idx); setSortAsc(true); }
  renderResult();
}

// ══════════════════════════════════════════════
//  Data Copy
// ══════════════════════════════════════════════
function copyCellFromRow(td, rowIdx, colIdx) {
  const r = getLastResult();
  if (!r || !window._displayRows) return;
  const row = window._displayRows[rowIdx];
  const col = r.columns[colIdx];
  const val = row[col];
  const text = val == null ? 'NULL' : String(val);
  navigator.clipboard.writeText(text).then(() => {
    td.classList.add('cell-copied');
    setTimeout(() => td.classList.remove('cell-copied'), 300);
    showToast('Copied');
  });
}

function viewCellDetail(rowIdx, colIdx) {
  const r = getLastResult();
  if (!r || !window._displayRows) return;
  const row = window._displayRows[rowIdx];
  const colName = r.columns[colIdx];
  const val = row[colName];
  const text = val == null ? 'NULL' : String(val);

  let display = text;
  let isJson = false;
  if (val != null) {
    try {
      const parsed = JSON.parse(text);
      display = JSON.stringify(parsed, null, 2);
      isJson = true;
    } catch (e) {}
  }

  const overlay = document.createElement('div');
  overlay.className = 'cell-viewer-overlay';
  overlay.id = 'cellViewer';
  overlay.innerHTML = `
    <div class="cell-viewer">
      <div class="cell-viewer-header">
        <span class="cv-title">${esc(colName)}${isJson ? ' <span style="color:var(--success);font-weight:400;font-size:11px">JSON</span>' : ''} <span style="color:var(--text3);font-weight:400;font-size:11px">${text.length.toLocaleString()} chars</span></span>
        <div class="cv-actions">
          <button class="btn btn-sm btn-secondary" onclick="navigator.clipboard.writeText(document.getElementById('cvContent').textContent).then(()=>showToast('Copied'))">Copy</button>
          <button class="btn btn-sm btn-secondary" onclick="closeCellViewer()">Close</button>
        </div>
      </div>
      <div class="cell-viewer-body" id="cvContent">${val == null ? '<span class="null-value">NULL</span>' : esc(display)}</div>
    </div>
  `;
  overlay.onclick = (e) => { if (e.target === overlay) closeCellViewer(); };
  document.body.appendChild(overlay);
}

function closeCellViewer() {
  const v = document.getElementById('cellViewer');
  if (v) v.remove();
}

function copyRow(rowIdx) {
  const r = getLastResult();
  if (!r || !window._displayRows) return;
  const row = window._displayRows[rowIdx];
  const cols = r.columns;
  const text = cols.map(c => { const v = row[c]; return v == null ? 'NULL' : String(v); }).join('\t');
  navigator.clipboard.writeText(text).then(() => showToast('Row copied'));
}

function copyAllResults() {
  const r = getLastResult();
  if (!r || !r.columns) return;
  const rows = r.rows || [];
  const cols = r.columns;
  let text = cols.join('\t') + '\n';
  for (const row of rows) {
    text += cols.map(c => { const v = row[c]; return v == null ? 'NULL' : String(v); }).join('\t') + '\n';
  }
  navigator.clipboard.writeText(text).then(() => showToast('All data copied'));
}

// ══════════════════════════════════════════════
//  Row Edit / Delete
// ══════════════════════════════════════════════
function addNewRow() {
  const ctx = getTableCtx();
  if (!ctx) return;
  const cols = schemaCache[`${ctx.schema}.${ctx.table}`] || [];

  let fieldsHtml = '';
  for (const col of cols) {
    const isSerial = col.default && col.default.startsWith('nextval(');
    const isPK = col.key === 'PRI';
    fieldsHtml += `
      <div class="form-field">
        <label>${esc(col.field)} <span style="color:var(--text3);font-weight:400">${esc(col.type)}${isPK ? ' · PRI' : ''}${isSerial ? ' · serial' : ''}</span></label>
        <input type="text" name="${esc(col.field)}" value="" placeholder="${isSerial ? 'auto-generated' : ''}"
          ${isSerial ? 'disabled style="background:var(--bg3)"' : ''} data-serial="${isSerial}">
        ${col.null === 'YES' ? `<label class="null-toggle"><input type="checkbox" onchange="toggleNullField(this)"> NULL</label>` : ''}
      </div>`;
  }

  showModal({
    title: `Insert Row — ${ctx.table}`,
    body: fieldsHtml,
    confirmText: 'Insert',
    onConfirm: async () => {
      const modal = document.getElementById('activeModal');
      const inputs = modal.querySelectorAll('.form-field input[type="text"]');

      const fields = [];
      const values = [];
      for (const input of inputs) {
        if (input.dataset.serial === 'true') continue;
        const nullCb = input.closest('.form-field').querySelector('.null-toggle input[type="checkbox"]');
        const isNull = nullCb && nullCb.checked;
        const val = input.value;
        if (isNull) {
          fields.push(quoteId(input.name));
          values.push('NULL');
        } else if (val !== '') {
          fields.push(quoteId(input.name));
          values.push(`'${sqlEsc(val)}'`);
        }
      }

      if (fields.length === 0) { showToast('Fill at least one field'); return false; }

      const sql = `INSERT INTO ${quoteId(ctx.schema)}.${quoteId(ctx.table)} (${fields.join(', ')}) VALUES (${values.join(', ')})`;
      const ok = await execSQL(sql);
      if (ok) {
        showToast('Row inserted');
        viewTableData(ctx.schema, ctx.table);
      }
      return ok;
    }
  });
}

function editRow(rowIdx) {
  const ctx = getTableCtx();
  if (!ctx || !window._displayRows) return;
  const row = window._displayRows[rowIdx];
  const cols = schemaCache[`${ctx.schema}.${ctx.table}`] || [];

  let fieldsHtml = '';
  for (const col of cols) {
    const val = row[col.field];
    const isNull = val == null;
    const isPK = col.key === 'PRI';
    const displayVal = isNull ? '' : String(val);
    fieldsHtml += `
      <div class="form-field">
        <label>${esc(col.field)} <span style="color:var(--text3);font-weight:400">${esc(col.type)}${isPK ? ' · PRI' : ''}</span></label>
        <input type="text" name="${esc(col.field)}" value="${escAttr(displayVal)}"
          ${isPK ? 'readonly' : ''}
          data-original="${escAttr(displayVal)}" data-null="${isNull}">
        ${!isPK && col.null === 'YES' ? `<label class="null-toggle"><input type="checkbox" ${isNull ? 'checked' : ''} onchange="toggleNullField(this)"> NULL</label>` : ''}
      </div>`;
  }

  showModal({
    title: `Edit Row — ${ctx.table}`,
    body: fieldsHtml,
    confirmText: 'Save',
    onConfirm: async () => {
      const modal = document.getElementById('activeModal');
      const inputs = modal.querySelectorAll('.form-field input[type="text"]');

      const setClauses = [];
      for (const input of inputs) {
        const field = input.name;
        const colSchema = cols.find(c => c.field === field);
        if (colSchema && colSchema.key === 'PRI') continue;

        const nullCb = input.closest('.form-field').querySelector('.null-toggle input[type="checkbox"]');
        const isNull = nullCb && nullCb.checked;
        const newVal = isNull ? null : input.value;
        const origNull = input.dataset.null === 'true';
        const origVal = origNull ? null : input.dataset.original;

        if (newVal !== origVal) {
          if (isNull) setClauses.push(`${quoteId(field)} = NULL`);
          else setClauses.push(`${quoteId(field)} = '${sqlEsc(newVal)}'`);
        }
      }

      if (setClauses.length === 0) { showToast('No changes'); return true; }

      const whereClause = ctx.primaryKeys.map(pk => {
        const val = row[pk];
        if (val == null) return `${quoteId(pk)} IS NULL`;
        return `${quoteId(pk)} = '${sqlEsc(String(val))}'`;
      }).join(' AND ');

      const sql = `UPDATE ${quoteId(ctx.schema)}.${quoteId(ctx.table)} SET ${setClauses.join(', ')} WHERE ${whereClause}`;
      const ok = await execSQL(sql);
      if (ok) { showToast('Updated'); viewTableData(ctx.schema, ctx.table); }
      return ok;
    }
  });
}

function toggleNullField(checkbox) {
  const input = checkbox.closest('.form-field').querySelector('input[type="text"]');
  if (checkbox.checked) { input.disabled = true; input.value = ''; input.style.background = 'var(--bg3)'; }
  else { input.disabled = false; input.style.background = ''; }
}

function deleteRow(rowIdx) {
  const ctx = getTableCtx();
  if (!ctx || !window._displayRows) return;
  const row = window._displayRows[rowIdx];
  const pkInfo = ctx.primaryKeys.map(pk => `${pk} = ${row[pk]}`).join(', ');

  showDangerConfirm({
    title: 'Confirm Delete',
    message: 'Delete this row?',
    detail: `${esc(ctx.table)} · ${esc(pkInfo)}`,
    confirmWord: null,
    onConfirm: async () => {
      const whereClause = ctx.primaryKeys.map(pk => {
        const val = row[pk];
        if (val == null) return `${quoteId(pk)} IS NULL`;
        return `${quoteId(pk)} = '${sqlEsc(String(val))}'`;
      }).join(' AND ');
      const sql = `DELETE FROM ${quoteId(ctx.schema)}.${quoteId(ctx.table)} WHERE ${whereClause}`;
      const ok = await execSQL(sql);
      if (ok) { showToast('Deleted'); viewTableData(ctx.schema, ctx.table); }
      return ok;
    }
  });
}

// ══════════════════════════════════════════════
//  Export CSV
// ══════════════════════════════════════════════
function exportCSV() {
  const _r = getLastResult();
  if (!_r || !_r.columns) return;
  const rows = _r.rows || [];
  const cols = _r.columns;

  const csvEsc = (v) => {
    if (v == null) return '';
    const s = String(v);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
  };

  let csv = cols.map(csvEsc).join(',') + '\n';
  for (const row of rows) csv += cols.map(c => csvEsc(row[c])).join(',') + '\n';

  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `query_result_${new Date().toISOString().slice(0,19).replace(/[:-]/g,'')}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('CSV exported');
}

// ══════════════════════════════════════════════
//  Modal System
// ══════════════════════════════════════════════
function showModal({title, body, confirmText = 'OK', onConfirm, width}) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'activeModal';
  overlay.innerHTML = `
    <div class="modal" ${width ? `style="width:${width}"` : ''}>
      <div class="modal-header">
        <span>${title}</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modalConfirmBtn">${confirmText}</button>
      </div>
    </div>
  `;
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  document.body.appendChild(overlay);

  document.getElementById('modalConfirmBtn').onclick = async () => {
    const btn = document.getElementById('modalConfirmBtn');
    btn.disabled = true; btn.innerHTML = '<span class="loading"></span>';
    const ok = await onConfirm();
    if (ok !== false) closeModal();
    else { btn.disabled = false; btn.textContent = confirmText; }
  };

  const firstInput = overlay.querySelector('input:not([readonly]),textarea,select');
  if (firstInput) setTimeout(() => firstInput.focus(), 50);
}

function showDangerConfirm({title, message, detail, confirmWord, onConfirm}) {
  const needsInput = confirmWord && confirmWord.length > 0;
  const inputHtml = needsInput
    ? `<div style="margin-top:12px"><div style="font-size:12px;color:var(--text2);margin-bottom:4px">Type <strong>${esc(confirmWord)}</strong> to confirm</div><input class="confirm-input" id="dangerConfirmInput" type="text" placeholder="${escAttr(confirmWord)}"></div>`
    : '';

  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'activeModal';
  overlay.innerHTML = `
    <div class="modal" style="width:420px">
      <div class="modal-header">
        <span>${title}</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" style="text-align:center;padding:20px 18px">
        <p style="font-size:14px;margin-bottom:6px">${message}</p>
        <p style="font-size:12px;color:var(--text2)">${detail}</p>
        ${inputHtml}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" id="dangerConfirmBtn" ${needsInput ? 'disabled' : ''}>Drop</button>
      </div>
    </div>
  `;
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  document.body.appendChild(overlay);

  if (needsInput) {
    const input = document.getElementById('dangerConfirmInput');
    const btn = document.getElementById('dangerConfirmBtn');
    input.oninput = () => { btn.disabled = input.value !== confirmWord; };
    setTimeout(() => input.focus(), 50);
  }

  document.getElementById('dangerConfirmBtn').onclick = async () => {
    const btn = document.getElementById('dangerConfirmBtn');
    btn.disabled = true; btn.innerHTML = '<span class="loading"></span>';
    const ok = await onConfirm();
    if (ok !== false) closeModal();
    else { btn.disabled = false; btn.textContent = 'Drop'; }
  };
}

function closeModal() {
  const m = document.getElementById('activeModal');
  if (m) m.remove();
}

// ══════════════════════════════════════════════
//  SQL Execution Helper
// ══════════════════════════════════════════════
async function execSQL(sql) {
  try {
    const resp = await fetch('/api/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sql, schema: currentSchema})
    });
    const data = await resp.json();
    if (data.code !== 200) {
      showToast('Error: ' + data.message);
      return false;
    }
    return true;
  } catch (e) {
    showToast('Error: ' + e.message);
    return false;
  }
}

// ══════════════════════════════════════════════
//  Utilities
// ══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function clearResults() {
  setLastResult(null); setSortCol(null); setTableCtx(null);
  document.getElementById('resultArea').innerHTML = `
    <div class="empty-state"><div class="empty-icon">&#9741;</div><p>Run a query to see results</p></div>`;
}

function esc(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function escAttr(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// PostgreSQL uses double-quote identifiers
function quoteId(s) { return '"' + String(s).replace(/"/g, '""') + '"'; }

function sqlEsc(s) { return String(s).replace(/'/g, "''"); }

// ══════════════════════════════════════════════
//  Keyboard Shortcuts
// ══════════════════════════════════════════════
document.getElementById('sqlInput').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    executeQuery();
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    this.value = this.value.substring(0, start) + '  ' + this.value.substring(this.selectionEnd);
    this.selectionStart = this.selectionEnd = start + 2;
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeCellViewer(); closeModal(); }
});

init();
</script>
