name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: Detect changed plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.changes.outputs.plugins }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # On first push (no previous SHA), build all plugins
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED_DIRS=$(git diff --name-only "$BASE" HEAD | grep '^shield-plugin-' | cut -d'/' -f1 | sort -u)

          PLUGINS="[]"
          if [ -n "$CHANGED_DIRS" ]; then
            PLUGINS=$(echo "$CHANGED_DIRS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "plugins=$PLUGINS" >> "$GITHUB_OUTPUT"
          if [ "$PLUGINS" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed plugins: $PLUGINS"

  build:
    name: Build ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          cd ${{ matrix.plugin }}
          go build -ldflags="-s -w" -o "${{ matrix.plugin }}" .

      - name: Verify binary
        run: |
          cd ${{ matrix.plugin }}
          ls -lh "${{ matrix.plugin }}"
          file "${{ matrix.plugin }}"
