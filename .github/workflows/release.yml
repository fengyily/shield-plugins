name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string
      plugins:
        description: "Plugins to build (comma-separated, e.g. shield-plugin-postgres,shield-plugin-redis). Leave empty to auto-detect from last tag."
        required: false
        type: string

permissions:
  contents: write

jobs:
  detect:
    name: Detect plugins to release
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.changes.outputs.plugins }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect plugins
        id: changes
        run: |
          # If plugins are manually specified, use them
          if [ -n "${{ inputs.plugins }}" ]; then
            PLUGINS=$(echo "${{ inputs.plugins }}" | tr ',' '\n' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "plugins=$PLUGINS" >> "$GITHUB_OUTPUT"
            echo "Manually specified plugins: $PLUGINS"
            exit 0
          fi

          # Auto-detect: compare with previous tag
          CURRENT_TAG="${{ steps.tag.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            # First release — build all plugins
            CHANGED_DIRS=$(ls -d shield-plugin-*/ 2>/dev/null | sed 's|/||')
          else
            CHANGED_DIRS=$(git diff --name-only "$PREV_TAG" "$CURRENT_TAG" | grep '^shield-plugin-' | cut -d'/' -f1 | sort -u)
          fi

          PLUGINS="[]"
          if [ -n "$CHANGED_DIRS" ]; then
            PLUGINS=$(echo "$CHANGED_DIRS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "plugins=$PLUGINS" >> "$GITHUB_OUTPUT"
          echo "Plugins to release: $PLUGINS"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          gh release create "$VERSION" \
            --repo "${{ github.repository }}" \
            --title "$VERSION" \
            --generate-notes \
            --draft=false 2>/dev/null || echo "Release $VERSION already exists"

  build:
    name: Build ${{ matrix.plugin }} (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [detect, release]
    if: needs.detect.outputs.plugins != '[]'
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build plugin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd ${{ matrix.plugin }}
          BINARY="${{ matrix.plugin }}"
          if [ "$GOOS" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          go build -ldflags="-s -w" -o "${BINARY}" .

          ASSET="${{ matrix.plugin }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "$GOOS" = "windows" ]; then
            zip "${ASSET}.zip" "${BINARY}"
          else
            tar czf "${ASSET}.tar.gz" "${BINARY}"
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ matrix.plugin }}
          shopt -s nullglob
          for f in *.tar.gz *.zip; do
            gh release upload "${{ needs.detect.outputs.version }}" "$f" \
              --repo "${{ github.repository }}" --clobber
          done
